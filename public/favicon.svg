<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2230"/>
      <stop offset="1" stop-color="#0b0e16"/>
    </linearGradient>
    <linearGradient id="blade" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#8fa3bf"/>
      <stop offset="0.5" stop-color="#eef4ff"/>
      <stop offset="1" stop-color="#c3d2ea"/>
    </linearGradient>
    <linearGradient id="trail" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#2ee6ff" stop-opacity="0"/>
      <stop offset="1" stop-color="#2ee6ff" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff7d6"/>
      <stop offset="0.35" stop-color="#ffd23f"/>
      <stop offset="1" stop-color="#ff7a18" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- weapon trail arc following the swing -->
  <path d="M12 50 A40 40 0 0 1 50 12" fill="none" stroke="url(#trail)"
        stroke-width="7" stroke-linecap="round" opacity="0.9"/>

  <!-- impact spark burst -->
  <g stroke="#ffd23f" stroke-width="3" stroke-linecap="round">
    <line x1="48" y1="16" x2="58" y2="7"/>
    <line x1="48" y1="16" x2="59" y2="18"/>
    <line x1="48" y1="16" x2="46" y2="4"/>
    <line x1="48" y1="16" x2="56" y2="26"/>
  </g>
  <circle cx="48" cy="16" r="12" fill="url(#spark)"/>

  <!-- sword -->
  <g transform="rotate(45 32 32)">
    <!-- blade -->
    <path d="M32 8 L36 40 L32 46 L28 40 Z" fill="url(#blade)" stroke="#5a6b85" stroke-width="1"/>
    <!-- fuller -->
    <line x1="32" y1="12" x2="32" y2="40" stroke="#9fb2cf" stroke-width="1.4"/>
    <!-- guard -->
    <rect x="22" y="44" width="20" height="5" rx="2.5" fill="#c98b3a"/>
    <!-- grip -->
    <rect x="30" y="49" width="4" height="9" rx="2" fill="#7a4a1e"/>
    <!-- pommel -->
    <circle cx="32" cy="59" r="3" fill="#c98b3a"/>
  </g>
</svg>
